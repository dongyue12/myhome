<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的主页</title>
  <meta name="description" content="一个简洁的个人主页，集中展示博客、文档与常用链接。">
  <meta name="theme-color" content="#f5efe6">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <!-- 添加favicon.ico -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg-gradient-1: #f3ecdf;
      --bg-gradient-2: #d9e6f2;
      --bg-mesh: rgba(185, 121, 77, 0.12);
      --card-bg: rgba(255, 252, 247, 0.86);
      --card-shadow: rgba(69, 50, 27, 0.18);
      --text-primary: #2c241d;
      --text-secondary: #5f5144;
      --text-muted: #8a7767;
      --link-bg: rgba(255, 255, 255, 0.8);
      --link-hover-bg: rgba(255, 255, 255, 0.98);
      --link-border: #c46f38;
      --link-shadow: rgba(196, 111, 56, 0.18);
      --icon-gradient-1: #d88b4f;
      --icon-gradient-2: #aa5a32;
      --social-bg: rgba(255, 255, 255, 0.8);
      --social-icon: #6c5949;
      --border-color: rgba(119, 87, 58, 0.14);
      --toggle-bg: rgba(255, 255, 255, 0.85);
      --toggle-icon: #6c5949;
      --focus-ring: rgba(196, 111, 56, 0.28);
    }

    [data-theme="dark"] {
      --bg-gradient-1: #16181d;
      --bg-gradient-2: #243648;
      --bg-mesh: rgba(245, 173, 98, 0.1);
      --card-bg: rgba(20, 24, 31, 0.82);
      --card-shadow: rgba(0, 0, 0, 0.42);
      --text-primary: #f4ede5;
      --text-secondary: #d2c1ae;
      --text-muted: #a89582;
      --link-bg: rgba(35, 43, 55, 0.84);
      --link-hover-bg: rgba(48, 59, 74, 0.96);
      --link-border: #f0a661;
      --link-shadow: rgba(240, 166, 97, 0.24);
      --icon-gradient-1: #f0a661;
      --icon-gradient-2: #ca6b42;
      --social-bg: rgba(35, 43, 55, 0.84);
      --social-icon: #d2c1ae;
      --border-color: rgba(255, 255, 255, 0.08);
      --toggle-bg: rgba(35, 43, 55, 0.84);
      --toggle-icon: #f4ede5;
      --focus-ring: rgba(240, 166, 97, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, var(--bg-mesh), transparent 34%),
        radial-gradient(circle at bottom right, var(--bg-mesh), transparent 28%),
        linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 28px;
      padding: 36px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px var(--card-shadow);
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent);
      pointer-events: none;
    }

    .theme-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--toggle-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 1;
    }

    .theme-toggle:hover {
      transform: translateY(-1px) scale(1.03);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: var(--toggle-icon);
      transition: fill 0.3s ease;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: white;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-name {
      font-size: clamp(28px, 5vw, 34px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 8px;
      text-align: center;
      transition: color 0.3s ease;
    }

    .description {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
      margin: 0 auto 24px;
      max-width: 34ch;
      text-align: center;
      transition: color 0.3s ease;
    }

    .navigation {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }

    .nav-item {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--link-bg);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid transparent;
      user-select: none;
    }

    .nav-item:hover {
      background: var(--link-hover-bg);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
      color: white;
      box-shadow: 0 4px 12px var(--link-shadow);
    }

    .category-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .category-section.active {
      display: block;
    }

    .category-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      padding: 16px 18px;
      background: var(--link-bg);
      border-radius: 18px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
    }

    .link-card:hover {
      background: var(--link-hover-bg);
      border-color: var(--link-border);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px var(--link-shadow);
    }

    .link-card.is-email {
      cursor: default;
    }

    .link-card.is-email:hover {
      transform: none;
      border-color: transparent;
      box-shadow: none;
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .link-content {
      flex: 1;
      text-align: left;
    }

    .link-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .link-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      transition: border-color 0.3s ease;
    }

    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--social-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: linear-gradient(135deg, var(--icon-gradient-1) 0%, var(--icon-gradient-2) 100%);
    }

    .social-link:hover svg {
      fill: white;
    }

    .social-link svg {
      width: 18px;
      height: 18px;
      fill: var(--social-icon);
      transition: fill 0.3s ease;
    }

    .loading {
      color: var(--text-secondary);
      padding: 40px;
      text-align: center;
      line-height: 1.8;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    button,
    .nav-item,
    .link-card,
    .social-link {
      outline: none;
    }

    button:focus-visible,
    .nav-item:focus-visible,
    .link-card:focus-visible,
    .social-link:focus-visible {
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .container {
        padding: 24px 18px;
        border-radius: 24px;
        margin-top: 10px;
      }

      .theme-toggle {
        top: 14px;
        right: 14px;
      }

      .avatar {
        width: 96px;
        height: 96px;
        font-size: 36px;
      }

      .link-card {
        padding: 14px 15px;
      }

      .link-icon {
        width: 36px;
        height: 36px;
        margin-right: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="container" id="app">
    <div class="loading">加载中...</div>
  </main>

  <script>
    const icons = {
      blog: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>',
      docs: '<svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
      github: '<svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>',
      twitter: '<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
      email: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>',
      sun: '<svg viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>',
      moon: '<svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>',
      default: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'
    };

    const DEFAULT_CONFIG = {
      site: {
        name: '我的主页',
        avatar: '',
        description: '欢迎来到我的个人主页'
      },
      nav: [],
      social: []
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function slugify(value, fallback = 'section') {
      const normalized = String(value ?? '')
        .trim()
        .toLowerCase()
        .replace(/[^\w\u4e00-\u9fa5-]+/g, '-')
        .replace(/^-+|-+$/g, '');
      return normalized || fallback;
    }

    function normalizeConfig(rawConfig) {
      const config = rawConfig && typeof rawConfig === 'object' ? rawConfig : {};
      const site = {
        ...DEFAULT_CONFIG.site,
        ...(config.site && typeof config.site === 'object' ? config.site : {})
      };

      const usedIds = new Set();
      const nav = Array.isArray(config.nav) ? config.nav : [];
      const normalizedNav = nav
        .filter((section) => section && typeof section === 'object')
        .map((section, index) => {
          const baseId = slugify(section.category_id || section.category, `section-${index + 1}`);
          let categoryId = baseId;
          let suffix = 2;
          while (usedIds.has(categoryId)) {
            categoryId = `${baseId}-${suffix}`;
            suffix += 1;
          }
          usedIds.add(categoryId);

          const items = Array.isArray(section.items) ? section.items : [];
          return {
            category: String(section.category || `分组 ${index + 1}`),
            category_id: categoryId,
            items: items
              .filter((item) => item && typeof item === 'object' && item.name && item.url)
              .map((item) => ({
                name: String(item.name),
                url: String(item.url),
                icon: String(item.icon || 'default'),
                description: item.description ? String(item.description) : ''
              }))
          };
        })
        .filter((section) => section.items.length > 0);

      const social = Array.isArray(config.social)
        ? config.social
            .filter((item) => item && typeof item === 'object' && item.name && item.url)
            .map((item) => ({
              name: String(item.name),
              url: String(item.url),
              icon: String(item.icon || 'default')
            }))
        : [];

      return { site, nav: normalizedNav, social };
    }

    function getStoredTheme() {
      return localStorage.getItem('theme');
    }

    function getTheme() {
      return getStoredTheme() ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    }

    function setTheme(theme, persist = true) {
      document.documentElement.setAttribute('data-theme', theme);
      if (persist) {
        localStorage.setItem('theme', theme);
      }
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const btn = document.querySelector('.theme-toggle');
      if (btn) {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        btn.innerHTML = isDark ? icons.sun : icons.moon;
        btn.title = isDark ? '切换到亮色模式' : '切换到暗色模式';
        btn.setAttribute('aria-label', btn.title);
      }
    }

    function extractEmail(url) {
      if (url.startsWith('mailto:')) {
        return url.substring(7);
      }
      return null;
    }

    async function loadConfig() {
      try {
        const response = await fetch('config.yaml');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const yamlText = await response.text();
        const config = normalizeConfig(jsyaml.load(yamlText));
        renderPage(config);
        setTheme(getTheme(), Boolean(getStoredTheme()));
        updateThemeIcon();
      } catch (error) {
        document.getElementById('app').innerHTML = `
          <div class="loading">
            配置加载失败，请检查 config.yaml 文件<br>
            错误信息: ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    function getInitialCategory(nav) {
      if (!nav.length) {
        return '';
      }

      const hashCategory = window.location.hash.replace(/^#/, '');
      if (hashCategory && nav.some((item) => item.category_id === hashCategory)) {
        return hashCategory;
      }

      const storedCategory = localStorage.getItem('activeCategory');
      if (storedCategory && nav.some((item) => item.category_id === storedCategory)) {
        return storedCategory;
      }

      return nav[0].category_id;
    }

    function activateCategory(categoryId) {
      const navItems = document.querySelectorAll('.nav-item');
      const categorySections = document.querySelectorAll('.category-section');
      const hasMatch = Array.from(navItems).some((item) => item.getAttribute('data-category') === categoryId);

      if (!hasMatch) {
        return;
      }

      navItems.forEach((item) => {
        const isActive = item.getAttribute('data-category') === categoryId;
        item.classList.toggle('active', isActive);
        item.setAttribute('aria-selected', String(isActive));
        item.setAttribute('tabindex', isActive ? '0' : '-1');
      });

      categorySections.forEach((section) => {
        const isActive = section.getAttribute('data-category') === categoryId;
        section.classList.toggle('active', isActive);
        section.hidden = !isActive;
      });

      localStorage.setItem('activeCategory', categoryId);
      if (window.location.hash !== `#${categoryId}`) {
        history.replaceState(null, '', `#${categoryId}`);
      }
    }

    function renderPage(config) {
      const { site, social, nav } = config;
      const activeCategory = getInitialCategory(nav);
      document.title = site.name;
      const descMeta = document.querySelector('meta[name="description"]');
      if (descMeta && site.description) {
        descMeta.setAttribute('content', site.description);
      }
      
      // 渲染导航栏
      let navigationHtml = '';
      if (nav && nav.length > 0) {
        navigationHtml = nav.map((navItem, index) => 
          `<button class="nav-item ${navItem.category_id === activeCategory ? 'active' : ''}" type="button" role="tab" aria-selected="${navItem.category_id === activeCategory}" tabindex="${navItem.category_id === activeCategory ? '0' : '-1'}" data-category="${escapeHtml(navItem.category_id)}">${escapeHtml(navItem.category)}</button>`
        ).join('');
      }

      // 渲染链接
      let linksHtml = '';
      if (nav && nav.length > 0) {
        linksHtml = nav.map((navItem, index) => {
          if (navItem.items && navItem.items.length > 0) {
            const itemsHtml = navItem.items.map(item => {
              const email = extractEmail(item.url);
              if (email) {
                return `
                  <div class="link-card is-email" role="group" aria-label="${escapeHtml(item.name)}">
                    <div class="link-icon">
                      ${icons[item.icon] || icons.email}
                    </div>
                    <div class="link-content">
                      <div class="link-name">${escapeHtml(item.name)}</div>
                      <div class="link-desc">${escapeHtml(email)}</div>
                    </div>
                  </div>
                `;
              }
              return `
                <a href="${escapeHtml(item.url)}" class="link-card" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(item.name)}">
                  <div class="link-icon">
                    ${icons[item.icon] || icons.default}
                  </div>
                  <div class="link-content">
                    <div class="link-name">${escapeHtml(item.name)}</div>
                    ${item.description ? `<div class="link-desc">${escapeHtml(item.description)}</div>` : ''}
                  </div>
                </a>
              `;
            }).join('');
            
            return `
              <section class="category-section ${navItem.category_id === activeCategory ? 'active' : ''}" data-category="${escapeHtml(navItem.category_id)}" ${navItem.category_id === activeCategory ? '' : 'hidden'} role="tabpanel" aria-label="${escapeHtml(navItem.category)}">
                <div class="category-links">
                  ${itemsHtml}
                </div>
              </section>
            `;
          }
          return '';
        }).join('');
      }

      let socialHtml = '';
      if (social && social.length > 0) {
        socialHtml = social.map(s => `
          <a href="${escapeHtml(s.url)}" class="social-link" target="_blank" rel="noopener noreferrer" title="${escapeHtml(s.name)}" aria-label="${escapeHtml(s.name)}">
            ${icons[s.icon] || icons.default}
          </a>
        `).join('');
      }

      document.getElementById('app').innerHTML = `
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
          ${icons.moon}
        </button>
        <div class="avatar">
          ${site.avatar ? `<img src="${escapeHtml(site.avatar)}" alt="${escapeHtml(site.name)} 头像" loading="lazy" decoding="async">` : escapeHtml(site.name.charAt(0))}
        </div>
        <h1 class="site-name">${escapeHtml(site.name)}</h1>
        ${site.description ? `<p class="description">${escapeHtml(site.description)}</p>` : ''}
        
        ${navigationHtml ? `<nav class="navigation" aria-label="分类导航" role="tablist">${navigationHtml}</nav>` : ''}

        <div class="links">
          ${linksHtml}
        </div>
        
        ${socialHtml ? `<div class="social-links">${socialHtml}</div>` : ''}
      `;
      
      updateThemeIcon();

      // 添加导航栏点击事件
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => {
        item.addEventListener('click', function() {
          activateCategory(this.getAttribute('data-category'));
        });

        item.addEventListener('keydown', function(event) {
          if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') {
            return;
          }

          const items = Array.from(navItems);
          const currentIndex = items.indexOf(this);
          const nextIndex = event.key === 'ArrowRight'
            ? (currentIndex + 1) % items.length
            : (currentIndex - 1 + items.length) % items.length;

          items[nextIndex].focus();
          activateCategory(items[nextIndex].getAttribute('data-category'));
        });
      });

      if (activeCategory) {
        activateCategory(activeCategory);
      }
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (!getStoredTheme()) {
        setTheme(getTheme(), false);
        updateThemeIcon();
      }
    });

    window.addEventListener('hashchange', () => {
      const category = window.location.hash.replace(/^#/, '');
      if (category) {
        activateCategory(category);
      }
    });

    loadConfig();
  </script>
</body>
</html>
